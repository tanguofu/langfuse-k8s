# HTTPRoute for langfuse.jmpti.woa.com on the shared ti-cloud/eg-tke Gateway.
#
# Prereq: eg-tke has the `http` listener (port 80, hostname *.jmpti.woa.com)
# — set up as a one-time ops task, not managed by this file.
#
# Apply:
#   kubectl apply -f deploy-ticloud/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langfuse
  namespace: ti-cloud-teamai
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: langfuse
    app.kubernetes.io/managed-by: kubectl
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg-tke
      namespace: ti-cloud
      sectionName: http
  hostnames:
    - langfuse.jmpti.woa.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: langfuse-web
          port: 3000
          weight: 1
